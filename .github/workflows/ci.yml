# CI workflow for linting, type checking and tests
name: CI

'on':
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"
  # Fix for typing-extensions import priority in CI environments
  PYTHONPATH: ".venv/lib/python3.13/site-packages:$PYTHONPATH"

jobs:
  lint-and-types:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsndfile1-dev libfftw3-dev libeigen3-dev libyaml-dev libavcodec-dev libavformat-dev libavutil-dev
          
      - name: Sync dependencies  
        run: uv sync --frozen --group dev

      - name: Ruff check
        run: uv run ruff check app tests

      - name: Ruff format check
        run: uv run ruff format --check app tests

      - name: Debug Python environment
        run: |
          echo "=== Python and uv debug info ==="
          python --version
          uv --version
          echo "=== Python path and packages ==="
          python -c "import sys; print('\n'.join(sys.path))"
          uv pip list | head -20
          echo "=== FastMCP import test ==="
          uv run python -c "import fastmcp; print('FastMCP version:', getattr(fastmcp, '__version__', 'unknown'))"
          echo "=== TypeForm test ==="
          uv run python -c "from typing_extensions import TypeForm; print('TypeForm available')"
          
      - name: Mypy
        run: |
          echo "Running mypy type checking..."
          uv run mypy --version
          echo "=== Testing app import ==="
          uv run python -c "from app.main import create_app; print('App import successful')"
          echo "=== Running mypy ==="
          uv run mypy app

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint-and-types
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Install security tools
        run: uv pip install bandit safety

      - name: Run Bandit security scan
        run: uv run bandit -r app/ -c pyproject.toml --severity-level medium --confidence-level medium -f json -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Run Safety dependency scan
        run: uv run safety check --output json > safety-report.json || true

      - name: Upload Safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-types

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Install lightweight audio deps
        run: uv pip install numpy scipy soundfile

      - name: Run tests with coverage
        run: uv run pytest -v --cov=app tests --cov-report=term --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

