name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint-and-types:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Clean and sync dependencies
        run: |
          echo "Cleaning UV cache and syncing dependencies..."
          uv cache clean
          uv sync --frozen --group dev
          echo "Dependencies synced successfully"

      - name: Debug environment
        run: |
          echo "Python version: $(python --version)"
          echo "UV version: $(uv --version)"
          echo "Installed packages:"
          uv pip list

      - name: Ruff check
        run: |
          echo "Running ruff check..."
          uv run ruff check app tests --verbose
          echo "Ruff check completed"

      - name: Ruff format check
        run: |
          echo "Running ruff format check..."
          uv run ruff format --check app tests
          echo "Ruff format check completed"

      - name: Mypy
        run: |
          echo "Running mypy..."
          uv run mypy app
          echo "Mypy check completed"

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-types

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Clean and sync dependencies
        run: |
          echo "Cleaning UV cache and syncing test dependencies..."
          uv cache clean
          uv sync --frozen --group dev
          echo "Test dependencies synced successfully"

      - name: Install lightweight audio deps
        run: |
          echo "Installing audio dependencies..."
          uv pip install numpy scipy soundfile
          echo "Audio dependencies installed successfully"

      - name: Run tests with coverage
        run: |
          echo "Running tests with coverage..."
          uv run pytest -v --cov=app tests --cov-report=term --cov-report=xml
          echo "Tests completed successfully"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
