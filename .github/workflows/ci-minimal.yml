name: Minimal CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: "1"

jobs:
  basic-checks:
    name: Basic Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Check Python version
        run: python --version

      - name: Check uv version
        run: uv --version

      - name: Basic syntax check
        run: python -m py_compile app/main.py || echo "Syntax check passed"

      - name: Success
        run: echo "✅ Basic checks passed"