name: PR Title Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  check-billing:
    name: Check GitHub Actions Status  
    runs-on: ubuntu-latest
    outputs:
      can_run: ${{ steps.check.outputs.can_run }}
    steps:
      - name: Check if Actions can run
        id: check
        run: |
          echo "Checking GitHub Actions availability..."
          echo "can_run=true" >> $GITHUB_OUTPUT
          echo "✅ GitHub Actions available"

  validate-title:
    name: Validate PR title format
    runs-on: ubuntu-latest
    needs: check-billing
    if: needs.check-billing.outputs.can_run == 'true'

    steps:
      - name: Validate title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          REQUIRED_PATTERN='^[A-Z][A-Z0-9]*-[0-9]+: .+'
          if [[ ! "$PR_TITLE" =~ $REQUIRED_PATTERN ]]; then
            echo "::error title=Invalid PR title::Expected format: TEAM-123: Short summary (example: BPM-123: Fix ORM defaults)."
            exit 1
          fi

  # Fallback job for billing issues
  billing-fallback:
    name: PR Title Check (Billing Issue)
    runs-on: ubuntu-latest
    if: failure() && needs.check-billing.result == 'failure'
    needs: check-billing
    steps:
      - name: Billing notice
        run: |
          echo "::warning title=GitHub Actions Billing Issue::The repository may have billing limitations."
          echo "::warning::Please check GitHub billing settings and resolve any payment issues."
          echo "::warning::Once billing is resolved, re-run this workflow."
          exit 0
