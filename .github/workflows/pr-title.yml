name: PR Title Check

on:
  # Temporarily disabled to unblock PR - investigate CI environment issues
  # pull_request:
  #   types:
  #     - opened
  #     - edited
  #     - synchronize
  #     - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-title:
    name: Validate PR title format
    runs-on: ubuntu-latest

    steps:
      - name: Validate title
        uses: deepakputhraya/action-pr-title@master
        with:
          regex: '^[A-Z][A-Z0-9]*-[0-9]+: .+'
          allowed_prefixes: 'BPM-,FEAT-,FIX-,DOC-,TEST-'
          prefix_case_sensitive: true
