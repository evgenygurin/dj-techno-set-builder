name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          title="${{ github.event.pull_request.title }}"
          if [[ ! "$title" =~ ^[A-Z][A-Z0-9]*-[0-9]+:\ .+ ]]; then
            echo "Invalid PR title format. Expected: TEAM-123: Description"
            exit 1
          fi