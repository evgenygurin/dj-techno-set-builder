name: PR Title Check

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  validate-title:
    name: Validate PR title format
    runs-on: ubuntu-latest

    steps:
      - name: Validate title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "=== DEBUG INFO ==="
          echo "PR title: '$PR_TITLE'"
          echo "PR title length: ${#PR_TITLE}"
          echo "Pattern: '^[A-Z][A-Z0-9]*-[0-9]+:[[:space:]].+'"
          echo "GitHub context - PR number: ${{ github.event.number }}"
          echo "GitHub context - action: ${{ github.event.action }}"
          echo "==================="
          
          # Use more explicit regex pattern with proper space handling
          if [[ "$PR_TITLE" =~ ^[A-Z][A-Z0-9]*-[0-9]+:[[:space:]].+ ]]; then
            echo "✅ PR title matches the required format"
          else
            echo "❌ PR title does not match the required format"
            echo "Expected format: TEAM-123: Short summary (example: BPM-123: Fix ORM defaults)"
            echo "::error title=Invalid PR title::Expected format: TEAM-123: Short summary (example: BPM-123: Fix ORM defaults)."
            exit 1
          fi
