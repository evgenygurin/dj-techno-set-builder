# ═══════════════════════════════════════════════════════════════════════════════
# Production
#
# docker compose -f compose.yaml -f compose.prod.yaml up -d --build
#
# - Минимальный образ (target: prod), non-root user
# - 4 uvicorn workers
# - Alembic миграции при старте
# - Автоматический restart
# - Health check на /health
# - DB пароль ОБЯЗАТЕЛЕН через .env или переменную окружения
# ═══════════════════════════════════════════════════════════════════════════════

services:
  app:
    build:
      context: .
      target: prod
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app
          --host 0.0.0.0
          --port 8000
          --workers 4
          --log-level warning
      "
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dj:${POSTGRES_PASSWORD}@db:5432/dj_set_builder
      DEBUG: "false"
      LOG_LEVEL: WARNING
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      retries: 3
      start_period: 15s
      timeout: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  db:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: !reset []
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
